[package]
name = "accessbridge-desktop-agent"
version = "0.21.0"
description = "AccessBridge desktop companion"
authors = ["Manish Kumar"]
license = "MIT"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-log = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", features = ["ws"] }
futures = "0.3"
ring = "0.17"
rand = "0.8"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
hex = "0.4"
sha2 = "0.10"
base64 = "0.22"
uuid = { version = "1", features = ["v4", "serde"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
once_cell = "1"
anyhow = "1"
dirs = "5"

# Session 21 — persistent profile store (SQLCipher) + OS-keyring-backed master key.
# The `bundled-sqlcipher-vendored-openssl` feature compiles SQLCipher + OpenSSL
# from source, so the first `cargo build` is slow (~5-10 min) but the resulting
# binary has no dynamic dependency on a system-installed OpenSSL or SQLCipher.
rusqlite = { version = "0.31", features = ["bundled-sqlcipher-vendored-openssl"] }
keyring = "3"

[target.'cfg(target_os = "windows")'.dependencies]
uiautomation = "0.15"
windows = { version = "0.58", features = ["Win32_UI_WindowsAndMessaging", "Win32_Foundation", "Win32_Graphics_Gdi", "Win32_UI_HiDpi", "Win32_System_ProcessStatus", "Win32_System_Threading"] }

# Session 21 — macOS NSAccessibility adapter deps. Gated to macOS so Windows
# and Linux builds never try to compile Apple-only crates.
[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.10"
core-foundation-sys = "0.8"
core-graphics = "0.24"
objc2 = "0.5"
objc2-foundation = { version = "0.3", features = ["NSString", "NSDictionary", "NSURL"] }
objc2-app-kit = { version = "0.2", features = ["NSWorkspace", "NSRunningApplication"] }

# Session 22 — Linux AT-SPI adapter deps. Gated to Linux so Windows and
# macOS builds never pull in D-Bus / zbus / AT-SPI crates.
# `atspi` defaults to `async-std`; override to tokio to match the agent runtime.
# `zbus` is re-exported by atspi but listed explicitly for `zbus::fdo::DBusProxy`.
[target.'cfg(target_os = "linux")'.dependencies]
atspi = { version = "0.22", default-features = false, features = ["tokio"] }
zbus = { version = "4.4", default-features = false, features = ["tokio"] }

[dev-dependencies]
tempfile = "3"

[features]
custom-protocol = ["tauri/custom-protocol"]

[[bin]]
name = "accessbridge-desktop-agent"
path = "src/main.rs"
