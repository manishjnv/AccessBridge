server {
    listen 80;
    server_name _;

    location / {
        alias /usr/share/nginx/html/docs/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /updates.xml {
        proxy_pass http://accessbridge-api:8100/updates.xml;
        proxy_set_header Host $host;
        add_header Content-Type "application/xml" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /downloads/ {
        alias /usr/share/nginx/html/docs/downloads/;
        add_header Content-Disposition "attachment";
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /models/ {
        alias /usr/share/nginx/html/models/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type, Authorization" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location /docs/ {
        alias /usr/share/nginx/html/docs/;
        index index.html;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Compliance Observatory — proxy to the observatory service.
    # /observatory/ prefix is stripped so the backend sees / and /api/...
    # Extension publishers hit /observatory/api/publish from any origin (CORS open).
    location /observatory/ {
        proxy_pass http://accessbridge-observatory:8200/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Access-Control-Max-Age "86400" always;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Max-Age "86400" always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain charset=UTF-8";
            return 204;
        }

        client_max_body_size 64k;
    }

    location /api/ {
        proxy_pass http://accessbridge-api:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        return 200 '{"status": "ok", "service": "accessbridge"}' ;
        add_header Content-Type application/json;
    }
}
