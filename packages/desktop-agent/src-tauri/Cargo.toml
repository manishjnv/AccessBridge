[package]
name = "accessbridge-desktop-agent"
version = "0.1.0"
description = "AccessBridge desktop companion"
authors = ["Manish Kumar"]
license = "MIT"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-log = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", features = ["ws"] }
futures = "0.3"
ring = "0.17"
rand = "0.8"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
hex = "0.4"
sha2 = "0.10"
base64 = "0.22"
uuid = { version = "1", features = ["v4", "serde"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
once_cell = "1"
anyhow = "1"

[target.'cfg(windows)'.dependencies]
uiautomation = "0.15"
windows = { version = "0.58", features = ["Win32_UI_WindowsAndMessaging", "Win32_Foundation", "Win32_Graphics_Gdi", "Win32_UI_HiDpi", "Win32_System_ProcessStatus", "Win32_System_Threading"] }

[features]
custom-protocol = ["tauri/custom-protocol"]

[[bin]]
name = "accessbridge-desktop-agent"
path = "src/main.rs"
